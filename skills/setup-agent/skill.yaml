schema_version: "1.1.0"
name: "setup-agent"
display_name: "Setup Agent"
description: "Validate and remediate local Ascend/NPU environments for MindSpore and torch_npu workloads, ensure uv is available, repair Python dependencies inside a user-confirmed uv environment, and emit a standard report."
version: "0.3.0"

entry:
  type: "manual"
  path: "SKILL.md"

role: "agent"

composes: []

factory:
  card_types: []

inputs:
  - name: "target"
    type: "enum"
    required: false
    default: "local"
    choices: ["local"]
    description: "This skill currently supports only the local machine."
  - name: "frameworks"
    type: "string"
    required: false
    default: "mindspore,torch_npu"
    description: "Comma-separated framework paths to inspect inside the uv environment."
  - name: "task_type"
    type: "enum"
    required: false
    default: "general"
    choices: ["general", "training", "inference", "diffusion"]
    description: "Used to decide whether optional runtime packages such as diffusers should be checked."
  - name: "uv_env_mode"
    type: "enum"
    required: false
    default: "ask"
    choices: ["reuse", "create", "ask"]
    description: "How to choose the target uv environment."
  - name: "python_version"
    type: "string"
    required: false
    description: "Python version to use when creating a new uv environment."

outputs:
  report_schema: "skills/_shared/contract/report.schema.json"
  out_dir_layout: "runs/<run_id>/out/"

permissions:
  network: "required"
  filesystem: "workspace-write"

dependencies:
  tools:
    - "bash"
    - "find"
  python: []

tags:
  - "mindspore"
  - "torch_npu"
  - "ascend"
  - "cann"
  - "environment"
  - "setup"
  - "uv"
